services:
  db:
    image: postgres:16
    container_name: renovation_tracker_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d renovation_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: ./backend

  frontend:
    build: ./frontend

volumes:
  postgres_data: